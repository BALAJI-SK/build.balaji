<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #050a14;
    --node-glow: #00d4ff;
    --node-active: #7c3aed;
    --node-achieve: #f59e0b;
    --node-like: #10b981;
    --node-output: #ec4899;
    --line: rgba(0,212,255,0.15);
    --line-active: rgba(0,212,255,0.7);
    --panel-bg: rgba(10,20,40,0.97);
    --text: #e2e8f0;
    --muted: #64748b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── PARTICLE CANVAS ── */
  #canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  /* ── HERO OVERLAY ── */
  #hero {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #hero.hidden { opacity:0; pointer-events:none; }

  .hero-badge {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--node-glow);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1s 0.5s forwards;
  }
  .hero-name {
    font-size: clamp(36px, 5vw, 72px);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #00d4ff 50%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s 0.8s forwards;
    line-height: 1.1;
  }
  .hero-sub {
    font-size: 18px;
    color: var(--muted);
    margin-top: 12px;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }
  .hero-cta {
    margin-top: 40px;
    padding: 14px 36px;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    pointer-events: all;
    opacity: 0;
    animation: fadeUp 1s 1.4s forwards;
    box-shadow: 0 0 30px rgba(0,212,255,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
  }
  .hero-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(0,212,255,0.6);
  }
  .hero-hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 1s 2s forwards;
    pointer-events: all;
  }

  /* ── NETWORK STAGE ── */
  #network {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  #network.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* ── SVG LINES ── */
  #svg-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* ── LAYER LABELS ── */
  .layer-label {
    position: absolute;
    top: 22px;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
  }

  /* ── NODES ── */
  .node {
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--node-glow);
    background: rgba(0,212,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: all 0.3s ease;
    z-index: 3;
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }
  .node:hover, .node.active {
    background: rgba(0,212,255,0.2);
    box-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.2);
    border-color: #fff;
    transform: translate(-50%, -50%) scale(1.2);
  }
  .node.type-input {
    width: 70px; height: 70px;
    border-color: var(--node-glow);
    background: rgba(0,212,255,0.15);
    box-shadow: 0 0 25px rgba(0,212,255,0.4);
  }
  .node.type-achieve {
    border-color: var(--node-achieve);
    background: rgba(245,158,11,0.08);
    box-shadow: 0 0 12px rgba(245,158,11,0.3);
  }
  .node.type-achieve:hover, .node.type-achieve.active {
    box-shadow: 0 0 30px rgba(245,158,11,0.7);
    border-color: var(--node-achieve);
    background: rgba(245,158,11,0.2);
  }
  .node.type-like {
    border-color: var(--node-like);
    background: rgba(16,185,129,0.08);
    box-shadow: 0 0 12px rgba(16,185,129,0.3);
  }
  .node.type-like:hover, .node.type-like.active {
    box-shadow: 0 0 30px rgba(16,185,129,0.7);
  }
  .node.type-output {
    width: 72px; height: 72px;
    border-color: var(--node-output);
    background: rgba(236,72,153,0.15);
    box-shadow: 0 0 25px rgba(236,72,153,0.5);
    animation: pulseOutput 2s infinite;
  }
  @keyframes pulseOutput {
    0%,100% { box-shadow: 0 0 25px rgba(236,72,153,0.5); }
    50% { box-shadow: 0 0 50px rgba(236,72,153,0.9), 0 0 80px rgba(236,72,153,0.3); }
  }

  .node-icon { font-size: 20px; pointer-events: none; }
  .node-label {
    position: absolute;
    bottom: -22px;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
    left: 50%;
    transform: translateX(-50%);
  }

  /* ── PULSE RING ── */
  .node::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0;
    animation: ring 3s infinite;
  }
  .node.active::before { animation: ring 1.5s infinite; opacity: 1; }
  @keyframes ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* ── SIDE PANEL ── */
  #panel {
    position: fixed;
    right: -440px;
    top: 0;
    width: 420px;
    height: 100vh;
    background: var(--panel-bg);
    border-left: 1px solid rgba(0,212,255,0.15);
    z-index: 10;
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    backdrop-filter: blur(20px);
    padding: 32px 28px;
  }
  #panel.open { right: 0; }

  .panel-close {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 36px; height: 36px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .panel-close:hover { background: rgba(255,255,255,0.12); }

  .panel-tag {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .panel-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .panel-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .panel-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .panel-item:hover { border-color: rgba(0,212,255,0.3); }

  .item-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .item-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    margin: 3px 2px;

  .badge-blue { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
  .badge-green { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
  .badge-pink { background: rgba(236,72,153,0.15); color: #ec4899; border: 1px solid rgba(236,72,153,0.3); }
  .badge-purple { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

  .stat-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 800; }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .connect-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ec4899, #7c3aed);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 1px;
    box-shadow: 0 0 30px rgba(236,72,153,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .connect-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(236,72,153,0.5);
  }

  /* ── BACK BTN ── */
  #back-btn {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 20;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 8px 18px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  #back-btn.visible { display: flex; }
  #back-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── MINI LEGEND ── */
  #legend {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 10;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  #legend.visible { display: flex; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* ── SCROLLABLE NODE PULSE ── */
  @keyframes nodePulse {
    0%,100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    background: rgba(10,20,40,0.95);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--node-glow);
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .tooltip.show { opacity: 1; }

  /* ── LAYER CONNECTOR LABEL ── */
  .flow-arrow {
    position: absolute;
    top: 50%;
    font-size: 20px;
    color: rgba(0,212,255,0.2);
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let networkActive = false;
let activeNode = null;

// ─────────────────────────────────────────────
//  INIT NETWORK
// ─────────────────────────────────────────────
function activateNetwork() {
  document.getElementById('hero').classList.add('hidden');
  const net = document.getElementById('network');
  net.classList.add('visible');
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('legend').classList.add('visible');
  networkActive = true;

  setTimeout(() => buildNetwork(), 100);
}

function goBack() {
  document.getElementById('hero').classList.remove('hidden');
  const net = document.getElementById('network');
  net.classList.remove('visible');
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('legend').classList.remove('visible');
  closePanel();
  // Clear network
  net.querySelectorAll('.node,.layer-label').forEach(el => el.remove());
  document.getElementById('svg-lines').innerHTML = '';
}

function buildNetwork() {
  const net = document.getElementById('network');
  const svg = document.getElementById('svg-lines');
  const W = window.innerWidth;
  const H = window.innerHeight;

  // Place nodes
  const positions = {};
  LAYERS.forEach(layer => {
    const lx = (layer.x / 100) * W;

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'layer-label';
    lbl.style.left = lx + 'px';
    lbl.textContent = layer.label;
    net.appendChild(lbl);

    const count = layer.nodes.length;
    layer.nodes.forEach((node, i) => {
      const yOffset = H * 0.5;
      const spread = count === 1 ? 0 : (count === 2 ? 90 : 120);
      const ly = yOffset + (i - (count - 1) / 2) * spread;

      positions[node.id] = { x: lx, y: ly };

      const el = document.createElement('div');
      el.className = `node type-${node.type}`;
      el.id = 'node-' + node.id;
      el.style.left = lx + 'px';
      el.style.top = ly + 'px';
      el.innerHTML = `<span class="node-icon">${node.icon}</span><span class="node-label">${node.label}</span>`;
      el.addEventListener('click', () => openPanel(node));
      el.addEventListener('mouseenter', (e) => showTooltip(e, node.title));
      el.addEventListener('mouseleave', hideTooltip);
      net.appendChild(el);
    });
  });

  // Draw lines
  for (let i = 0; i < LAYERS.length - 1; i++) {
    const fromLayer = LAYERS[i];
    const toLayer = LAYERS[i + 1];
    fromLayer.nodes.forEach(from => {
      toLayer.nodes.forEach(to => {
        const fp = positions[from.id];
        const tp = positions[to.id];
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fp.x); line.setAttribute('y1', fp.y);
        line.setAttribute('x2', tp.x); line.setAttribute('y2', tp.y);
        line.setAttribute('stroke', 'rgba(0,212,255,0.12)');
        line.setAttribute('stroke-width', '1');
        line.id = `line-${from.id}-${to.id}`;
        svg.appendChild(line);
      });
    });
  }

  // Animate lines with a subtle data-flow particle effect via CSS trick
  animateParticles(positions);
}

function animateParticles(positions) {
  // Simple: cycle line opacity
  setInterval(() => {
    if (!networkActive) return;
    LAYERS.forEach(layer => {
      layer.nodes.forEach(n => {
        const el = document.getElementById('node-' + n.id);
        if (el && !el.classList.contains('active')) {
          el.style.opacity = (0.7 + Math.random() * 0.3).toString();
        }
      });
    });
  }, 1800);
}

// ─────────────────────────────────────────────
//  PANEL
// ─────────────────────────────────────────────
function openPanel(node) {
  // Deactivate old
  if (activeNode) {
    const prev = document.getElementById('node-' + activeNode.id);
    if (prev) prev.classList.remove('active');
  }
  activeNode = node;
  const el = document.getElementById('node-' + node.id);
  if (el) el.classList.add('active');

  // Highlight lines
  highlightLines(node.id);

  const tagColorMap = { '#00d4ff': 'badge-blue', '#f59e0b': 'badge-yellow', '#10b981': 'badge-green', '#ec4899': 'badge-pink' };
  const badgeClass = tagColorMap[node.tagColor] || 'badge-blue';

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-tag" style="color:${node.tagColor}">⬡ ${node.tag}</div>
    <div class="panel-title">${node.title}</div>
    <div class="panel-desc">${node.desc}</div>
    ${node.content}
  `;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeNode) {
    const prev = document.getElementById('node-' + activeNode.id);
    if (prev) prev.classList.remove('active');
    activeNode = null;
  }
  resetLines();
}

function highlightLines(nodeId) {
  const svg = document.getElementById('svg-lines');
  svg.querySelectorAll('line').forEach(line => {
    const id = line.id;
    if (id.includes(nodeId)) {
      line.setAttribute('stroke', 'rgba(0,212,255,0.7)');
      line.setAttribute('stroke-width', '2');
    } else {
      line.setAttribute('stroke', 'rgba(0,212,255,0.05)');
    }
  });
}

function resetLines() {
  const svg = document.getElementById('svg-lines');
  svg.querySelectorAll('line').forEach(line => {
    line.setAttribute('stroke', 'rgba(0,212,255,0.12)');
    line.setAttribute('stroke-width', '1');
  });
}

// ─────────────────────────────────────────────
//  TOOLTIP
// ─────────────────────────────────────────────
function showTooltip(e, text) {
  const t = document.getElementById('tooltip');
  t.textContent = text;
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
  t.classList.add('show');
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ─────────────────────────────────────────────
//  PARTICLE CANVAS BACKGROUND
// ─────────────────────────────────────────────
(function initCanvas() {
  const canvas = document.createElement('canvas');
  canvas.id = 'canvas';
  document.body.prepend(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = Array.from({length: 60}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    alpha: Math.random() * 0.4 + 0.1
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    // Faint grid
    ctx.strokeStyle = 'rgba(0,212,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 60) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 60) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
})();
</script>
